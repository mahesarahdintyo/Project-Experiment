<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Stamping Production</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#f4f5f7">
<link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<script>
  // set tema sebelum render, biar tidak "kedip" saat load
  (function () {
    var t = localStorage.getItem("theme_v1") || "light";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="assets/supabaseClient.js"></script>
</head>
<body>

<div class="app-shell" x-data="dashboard()" x-init="init()">
  <div class="mobile-topbar">
    <button class="hamburger" @click="mobileNavOpen = true">☰</button>
    <span class="mobile-title">Dashboard</span>
  </div>
  <div class="sidebar-overlay" x-show="mobileNavOpen" @click="mobileNavOpen = false" x-cloak></div>
  <aside class="sidebar" :class="[mobileNavOpen ? 'sidebar-open' : '', sidebarCollapsed ? 'sidebar-collapsed' : '']">
    <button class="sidebar-collapse-btn" @click="sidebarCollapsed = !sidebarCollapsed">
      <span x-show="!sidebarCollapsed">‹</span><span x-show="sidebarCollapsed">›</span>
    </button>
    <div class="sidebar-brand" x-show="!sidebarCollapsed">PRESS SHOP<span>·</span>SYSTEM</div>
    <nav class="sidebar-nav" @click="mobileNavOpen = false">
      <a href="index.html" class="sidebar-link active"><span>🏠</span><span x-show="!sidebarCollapsed">Dashboard</span></a>
      <a href="machines/tandem.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Tandem</span></a>
      <a href="machines/blanking.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Blanking</span></a>
      <a href="machines/transfer-2000t.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Transfer 2000t</span></a>
      <a href="machines/transfer-800t.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">Transfer 800t</span></a>
      <a href="machines/pc200t.html" class="sidebar-link"><span>⚙️</span><span x-show="!sidebarCollapsed">PC200t</span></a>
    </nav>
    <div class="sidebar-foot" x-show="!sidebarCollapsed">
      <div class="who" x-text="profile?.full_name || session?.user?.email || '...'"></div>
      <span class="badge" :class="profile?.role === 'admin' ? 'role-admin' : ''" x-text="profile?.role || '...'"></span>
      <button class="btn-ghost btn-sm" @click="logout()">Keluar</button>
    </div>
    <button class="sidebar-logout-collapsed" x-show="sidebarCollapsed" @click="logout()" title="Keluar">⏻</button>
  </aside>

  <main class="main">
    <!-- Topbar -->
    <div class="dash-topbar">
      <div class="dash-title-block">
        <h1>STAMPING PRODUCTION DASHBOARD</h1>
        <p>Monitoring &amp; Management Control</p>
      </div>
      <div class="dash-controls">
        <div class="perf-toggle-row" style="margin:0;">
          <button type="button" class="chip" :class="periodMode==='harian' ? 'chip-active' : ''" @click="setPeriodMode('harian')">Harian</button>
          <button type="button" class="chip" :class="periodMode==='bulanan' ? 'chip-active' : ''" @click="setPeriodMode('bulanan')">Bulanan</button>
          <button type="button" class="chip" :class="periodMode==='tahunan' ? 'chip-active' : ''" @click="setPeriodMode('tahunan')">Tahunan</button>
        </div>
        <input type="date" x-model="tanggal" @change="fetchAll()" x-show="periodMode==='harian'">
        <template x-if="periodMode==='bulanan'">
          <select x-model="bulanPilih" @change="applyBulan()">
            <option value="0">Januari</option><option value="1">Februari</option>
            <option value="2">Maret</option><option value="3">April</option>
            <option value="4">Mei</option><option value="5">Juni</option>
            <option value="6">Juli</option><option value="7">Agustus</option>
            <option value="8">September</option><option value="9">Oktober</option>
            <option value="10">November</option><option value="11">Desember</option>
          </select>
        </template>
        <input type="number" min="2000" max="2100" x-model="tahunPilih" @change="applyTahun()"
               x-show="periodMode==='bulanan' || periodMode==='tahunan'" style="max-width:100px;">
        <select x-model="shiftFilter" @change="fetchAll()" x-show="periodMode==='harian'">
          <option value="all">Semua Shift</option>
          <option value="1">Shift 1 (07:00–19:30)</option>
          <option value="2">Shift 2 (19:30–07:00)</option>
        </select>
        <button class="theme-toggle" @click="toggleTheme()" :title="theme === 'dark' ? 'Ke mode terang' : 'Ke mode gelap'">
          <span x-text="theme === 'dark' ? '☀️' : '🌙'"></span>
        </button>
      </div>
    </div>

    <template x-if="loading"><p class="empty-state">Memuat data...</p></template>

    <template x-if="!loading">
      <div>
        <div class="error-msg" x-show="machinesTanpaTarget.length > 0" x-cloak>
          ⚠️ <b>Target GSPH belum diisi</b> untuk:
          <span x-text="machinesTanpaTarget.join(', ')"></span>.
          Akibatnya <b>Performance &amp; OEE tampil 0%</b>.
          Isi dulu di halaman mesin → tab <b>Master Data</b> → panel <b>Target GSPH</b> (khusus admin/leader).
        </div>

        <!-- 6 kartu kontrol utama (gaya SQCDMP) -->
        <div class="sqcdmp-grid">
          <div class="sqcdmp-card" :class="'sqcdmp-' + cardStatus(totals.performanceFactor, 95, 80)">
            <div class="sqcdmp-head"><span class="sqcdmp-icon">⚡</span>GSPH</div>
            <div class="sqcdmp-value" x-text="fmtNum(totals.gsph)"></div>
            <div class="sqcdmp-sub">Target: <b x-text="fmtNum(totals.targetGsph)"></b></div>
            <div class="sqcdmp-badge" x-text="cardLabel(totals.performanceFactor, 95, 80)"></div>
          </div>
          <div class="sqcdmp-card" :class="'sqcdmp-' + cardStatus(100 - ngRatePct * 2, 90, 80)">
            <div class="sqcdmp-head"><span class="sqcdmp-icon">🛡️</span>NG RATE</div>
            <div class="sqcdmp-value" x-text="fmtNum(ngRatePct) + '%'"></div>
            <div class="sqcdmp-sub">Target: ≤ 0,5% · <b x-text="fmtNum(totals.ng)"></b> pcs</div>
            <div class="sqcdmp-badge" x-text="cardLabel(100 - ngRatePct * 2, 90, 80)"></div>
          </div>
          <div class="sqcdmp-card" :class="'sqcdmp-' + cardStatus(achievementPct, 95, 80)">
            <div class="sqcdmp-head"><span class="sqcdmp-icon">📈</span>PRODUCTIVITY</div>
            <div class="sqcdmp-value" x-text="fmtNum(achievementPct) + '%'"></div>
            <div class="sqcdmp-sub">Achievement vs Planning</div>
            <div class="sqcdmp-badge" x-text="cardLabel(achievementPct, 95, 80)"></div>
          </div>
          <div class="sqcdmp-card" :class="'sqcdmp-' + cardStatus(totals.availability, 95, 85)">
            <div class="sqcdmp-head"><span class="sqcdmp-icon">✅</span>AVAILABILITY</div>
            <div class="sqcdmp-value" x-text="fmtNum(totals.availability) + '%'"></div>
            <div class="sqcdmp-sub">Target: ≥ 95%</div>
            <div class="sqcdmp-badge" x-text="cardLabel(totals.availability, 95, 85)"></div>
          </div>
          <div class="sqcdmp-card" :class="'sqcdmp-' + cardStatus(100 - downtimePct * 5, 90, 75)">
            <div class="sqcdmp-head"><span class="sqcdmp-icon">⏱</span>DOWNTIME</div>
            <div class="sqcdmp-value" x-text="fmtNum(totals.downtimeMenit)"></div>
            <div class="sqcdmp-sub">menit</div>
            <div class="sqcdmp-badge" x-text="cardLabel(100 - downtimePct * 5, 90, 75)"></div>
          </div>
          <div class="sqcdmp-card" :class="'sqcdmp-' + cardStatus(attendance.pct, 95, 85)">
            <div class="sqcdmp-head"><span class="sqcdmp-icon">👥</span>MORALE</div>
            <div class="sqcdmp-value" x-text="fmtNum(attendance.pct) + '%'"></div>
            <div class="sqcdmp-sub">Attendance · <b x-text="fmtNum(attendance.absen)"></b> absen</div>
            <div class="sqcdmp-badge" x-text="cardLabel(attendance.pct, 95, 85)"></div>
          </div>
        </div>

        <!-- Input Absensi (admin/leader) -->
        <div class="dash-panel" x-show="isLeaderOrAdmin()" style="margin-bottom:18px;">
          <p class="dash-panel-title">Input Absensi Harian</p>
          <div class="form-grid">
            <div class="field"><label>Tanggal</label><input type="date" x-model="absenForm.tanggal"></div>
            <div class="field">
              <label>Shift</label>
              <select x-model="absenForm.shift"><option value="1">Shift 1</option><option value="2">Shift 2</option></select>
            </div>
            <div class="field"><label>Total Orang</label><input type="number" x-model="absenForm.total_orang"></div>
            <div class="field"><label>Hadir</label><input type="number" x-model="absenForm.hadir"></div>
            <div class="field"><label>Absen</label><input type="number" x-model="absenForm.absen"></div>
            <div class="field"><label>Overtime (jam)</label><input type="number" x-model="absenForm.overtime_jam"></div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-primary" @click="saveAbsensi()">Simpan Absensi</button>
          </div>
        </div>

        <!-- Ringkasan tambahan -->
        <div class="fleet-summary-grid">
          <div class="perf-card"><span class="perf-label">Total Stroke</span><span class="perf-value" x-text="fmtNum(totals.stroke)"></span></div>
          <div class="perf-card"><span class="perf-label">Total Dandori</span><span class="perf-value" x-text="fmtNum(totals.dandoriMenit) + ' mnt'"></span></div>
          <div class="perf-card"><span class="perf-label">Line Aktif</span><span class="perf-value" x-text="lineAktif + ' / ' + machines.length"></span></div>
          <div class="perf-card"><span class="perf-label">OEE Fleet</span><span class="perf-value" x-text="fmtNum(fleetOee) + '%'"></span></div>
        </div>

        <!-- Baris utama: trend + pareto + OEE breakdown -->
        <div class="dash-main-grid">
          <div class="dash-panel">
            <p class="dash-panel-title">Trend GSPH per Jam</p>
            <div class="dash-chart-sm"><canvas id="gsphHourlyChart"></canvas></div>
          </div>
          <div class="dash-panel">
            <p class="dash-panel-title">Pareto Downtime (Menit)</p>
            <template x-for="row in paretoDowntime" :key="row.problem">
              <div class="pareto-row">
                <span class="pareto-label" :title="row.problem" x-text="row.problem"></span>
                <div class="pareto-bar-track">
                  <div class="pareto-bar-fill" :style="'width:' + row.pct + '%'"></div>
                </div>
                <span class="pareto-val" x-text="fmtNum(row.menit) + ' (' + fmtNum(row.pct) + '%)'"></span>
              </div>
            </template>
            <p class="empty-state" x-show="paretoDowntime.length === 0">Tidak ada downtime.</p>
          </div>
          <div class="dash-panel">
            <p class="dash-panel-title">OEE Breakdown</p>
            <div class="oee-donut-row">
              <div class="oee-donut-item">
                <div class="oee-donut-wrap"><canvas id="donutAvail"></canvas></div>
                <div class="oee-donut-label">Availability</div>
              </div>
              <div class="oee-donut-item">
                <div class="oee-donut-wrap"><canvas id="donutPerf"></canvas></div>
                <div class="oee-donut-label">Performance</div>
              </div>
              <div class="oee-donut-item">
                <div class="oee-donut-wrap"><canvas id="donutQual"></canvas></div>
                <div class="oee-donut-label">Quality</div>
              </div>
              <div class="oee-total">
                <div class="oee-total-value" x-text="fmtNum(totals.oee) + '%'"></div>
                <div class="oee-donut-label">OEE</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Status mesin -->
        <div class="dash-panel" style="margin-bottom:18px;">
          <p class="dash-panel-title">Line Status</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Line</th><th>Stroke</th><th>Target GSPH</th><th>Actual GSPH</th>
                  <th>NG</th><th>Performance</th><th>OEE</th><th>Downtime</th><th>Status</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="m in machines" :key="m.key">
                  <tr>
                    <td><b x-text="m.label"></b></td>
                    <td class="mono" x-text="fmtNum(m.data?.stroke)"></td>
                    <td class="mono" x-text="fmtNum(m.data?.targetGsph)"></td>
                    <td class="mono" x-text="fmtNum(m.data?.gsph)"></td>
                    <td class="mono" x-text="fmtNum(m.data?.ng)"></td>
                    <td class="mono" x-text="fmtNum(m.data?.performanceFactor) + '%'"></td>
                    <td class="mono" x-text="fmtNum(m.data?.oee) + '%'"></td>
                    <td class="mono" x-text="fmtNum(m.data?.downtimeMenit) + ' mnt'"></td>
                    <td><span class="status-badge" :class="statusClass(m)" x-text="statusLabel(m)"></span></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Baris bawah: downtime per kategori x line + top problem -->
        <div class="dash-main-grid" style="grid-template-columns: 1fr 1fr;">
          <div class="dash-panel">
            <p class="dash-panel-title">Downtime per Kategori × Line</p>
            <div class="dash-chart-sm" style="height:240px;"><canvas id="fleetDowntimeChart"></canvas></div>
          </div>
          <div class="dash-panel">
            <p class="dash-panel-title">10 Downtime Terburuk (Semua Line)</p>
            <div class="table-wrap" style="max-height:240px;">
              <table>
                <thead><tr><th>Line</th><th>Kategori</th><th>Problem</th><th>Menit</th></tr></thead>
                <tbody>
                  <template x-for="row in fleetTop10" :key="row.mesin + row.kategori + row.problem">
                    <tr>
                      <td><span class="badge" x-text="row.mesinLabel"></span></td>
                      <td x-text="row.kategori"></td>
                      <td x-text="row.problem"></td>
                      <td class="mono" x-text="fmtNum(row.menit)"></td>
                    </tr>
                  </template>
                  <tr x-show="fleetTop10.length === 0"><td colspan="4" class="empty-state">Tidak ada downtime.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </template>
  </main>
</div>

<script>
const MACHINES = [
  { key: "tandem", label: "Tandem", href: "machines/tandem.html" },
  { key: "blanking", label: "Blanking", href: "machines/blanking.html" },
  { key: "transfer_2000t", label: "Transfer 2000t", href: "machines/transfer-2000t.html" },
  { key: "transfer_800t", label: "Transfer 800t", href: "machines/transfer-800t.html" },
  { key: "pc200t", label: "PC200t", href: "machines/pc200t.html" },
];

function fmtNum(n) {
  if (n === null || n === undefined || Number.isNaN(Number(n))) return "-";
  return Number(n).toLocaleString("en-US", { maximumFractionDigits: 1 });
}

function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function dashboard() {
  return {
    session: null, profile: null, mobileNavOpen: false, sidebarCollapsed: true,
    loading: true,
    theme: localStorage.getItem("theme_v1") || "light",
    tanggal: new Date().toISOString().slice(0, 10),
    shiftFilter: "all",
    periodMode: "harian",
    bulanPilih: String(new Date().getMonth()),
    tahunPilih: String(new Date().getFullYear()),
    attendance: { pct: 0, hadir: 0, absen: 0, total_orang: 0, overtime_jam: 0 },
    absenForm: { tanggal: new Date().toISOString().slice(0, 10), shift: "1", total_orang: "", hadir: "", absen: "", overtime_jam: "" },
    achievementPct: 0,
    ngRatePct: 0, downtimePct: 0,
    isLeaderOrAdmin() { return this.profile && ["admin", "leader"].includes(this.profile.role); },
    cardStatus(val, greenAt, amberAt) {
      const v = Number(val) || 0;
      if (v >= greenAt) return "good";
      if (v >= amberAt) return "warn";
      return "bad";
    },
    cardLabel(val, greenAt, amberAt) {
      const s = this.cardStatus(val, greenAt, amberAt);
      return s === "good" ? "GOOD" : s === "warn" ? "WARNING" : "CRITICAL";
    },
    async fetchAttendance() {
      const { start, end } = this.bounds();
      const { data, error } = await supabaseClient.rpc("attendance_summary", {
        p_start: start.toISOString().slice(0, 10), p_end: end.toISOString().slice(0, 10),
      });
      const row = (!error && data && data[0]) || {};
      const totalOrang = Number(row.total_orang) || 0;
      const hadir = Number(row.hadir) || 0;
      this.attendance = {
        total_orang: totalOrang, hadir, absen: Number(row.absen) || 0,
        overtime_jam: Number(row.overtime_jam) || 0,
        pct: totalOrang > 0 ? (hadir / (totalOrang * this.attendanceDaysInPeriod())) * 100 : 0,
      };
    },
    attendanceDaysInPeriod() {
      // perkiraan jumlah hari (shift-hari) tercakup dlm periode -- utk basis
      // rata-rata persentase kehadiran (bukan cuma total hadir mentah).
      const { start, end } = this.bounds();
      const days = Math.max(1, Math.round((end - start) / 86400000));
      return days;
    },
    async saveAbsensi() {
      const f = this.absenForm;
      if (!f.tanggal || f.total_orang === "" || f.hadir === "") { alert("Tanggal, Total Orang, dan Hadir wajib diisi."); return; }
      const payload = {
        tanggal: f.tanggal, shift: f.shift,
        total_orang: Number(f.total_orang) || 0, hadir: Number(f.hadir) || 0,
        absen: Number(f.absen) || 0, overtime_jam: Number(f.overtime_jam) || 0,
        updated_by: this.session.user.id,
      };
      const { error } = await supabaseClient.from("attendance_log").upsert(payload, { onConflict: "tanggal,shift" });
      if (error) { alert("Gagal simpan absensi: " + error.message); return; }
      this.fetchAttendance();
    },
    applyBulan() {
      const d = new Date(this.tanggal + "T00:00:00");
      d.setDate(1);
      d.setMonth(Number(this.bulanPilih));
      this.tanggal = d.toISOString().slice(0, 10);
      this.fetchAll();
    },
    applyTahun() {
      const y = Number(this.tahunPilih);
      if (!y || y < 2000) return;
      const d = new Date(this.tanggal + "T00:00:00");
      d.setDate(1);
      d.setFullYear(y);
      this.tanggal = d.toISOString().slice(0, 10);
      this.fetchAll();
    },
    setPeriodMode(mode) {
      this.periodMode = mode;
      const d = new Date(this.tanggal + "T00:00:00");
      this.bulanPilih = String(d.getMonth());
      this.tahunPilih = String(d.getFullYear());
      this.fetchAll();
    },
    machines: MACHINES.map((m) => ({ ...m, data: null, lastPart: null, lastEnd: null })),
    totals: { stroke: 0, ng: 0, downtimeMenit: 0, dandoriMenit: 0, gsph: 0, targetGsph: 0, availability: 0, performanceFactor: 0, quality: 100, oee: 0 },
    paretoDowntime: [], fleetTop10: [], lineAktif: 0,
    machinesTanpaTarget: [],
    charts: {},

    fmtNum,

    async init() {
      this.session = await requireAuth();
      if (!this.session) return;
      try {
        const { data } = await supabaseClient.from("profiles").select("*").eq("id", this.session.user.id).maybeSingle();
        this.profile = data;
      } catch (err) { console.error(err); }
      await this.fetchAll();
    },

    toggleTheme() {
      this.theme = this.theme === "dark" ? "light" : "dark";
      localStorage.setItem("theme_v1", this.theme);
      document.documentElement.setAttribute("data-theme", this.theme);
      this.$nextTick(() => this.renderAllCharts());
    },

    periodeLabel() {
      const d = new Date(this.tanggal + "T00:00:00");
      if (this.periodMode === "tahunan") return String(d.getFullYear());
      if (this.periodMode === "bulanan") return d.toLocaleDateString("id-ID", { month: "long", year: "numeric" });
      return d.toLocaleDateString("id-ID", { day: "2-digit", month: "long", year: "numeric" });
    },

    bounds() {
      const d = new Date(this.tanggal + "T00:00:00");
      if (this.periodMode === "tahunan") {
        return { start: new Date(d.getFullYear(), 0, 1), end: new Date(d.getFullYear() + 1, 0, 1) };
      }
      if (this.periodMode === "bulanan") {
        return { start: new Date(d.getFullYear(), d.getMonth(), 1), end: new Date(d.getFullYear(), d.getMonth() + 1, 1) };
      }
      // harian -- boleh difilter per shift
      if (this.shiftFilter === "1") {
        return { start: new Date(d.getFullYear(), d.getMonth(), d.getDate(), 7, 0), end: new Date(d.getFullYear(), d.getMonth(), d.getDate(), 19, 30) };
      }
      if (this.shiftFilter === "2") {
        return { start: new Date(d.getFullYear(), d.getMonth(), d.getDate(), 19, 30), end: new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1, 7, 0) };
      }
      return { start: new Date(d.getFullYear(), d.getMonth(), d.getDate()), end: new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1) };
    },

    async fetchAll() {
      this.loading = true;
      const { start, end } = this.bounds();

      const results = await Promise.all(MACHINES.map(async (m) => {
        const [aggRes, settingsRes, topRes, catRes, hourlyRes, statusRes] = await Promise.all([
          supabaseClient.rpc("performance_aggregate", { p_mesin: m.key, p_stasiun_list: null, p_start: start.toISOString(), p_end: end.toISOString() }),
          supabaseClient.from("mesin_settings").select("*").eq("mesin", m.key).maybeSingle(),
          supabaseClient.rpc("downtime_top_problems", { p_mesin: m.key, p_stasiun_list: null, p_start: start.toISOString(), p_end: end.toISOString(), p_limit: 10 }),
          supabaseClient.rpc("downtime_by_category", { p_mesin: m.key, p_stasiun_list: null, p_start: start.toISOString(), p_end: end.toISOString() }),
          supabaseClient.rpc("gsph_hourly", { p_mesin: m.key, p_start: start.toISOString(), p_end: end.toISOString() }),
          supabaseClient.from("production_log").select("part_number, waktu_akhir").eq("mesin", m.key)
            .gte("waktu_awal", start.toISOString()).lt("waktu_awal", end.toISOString())
            .order("waktu_awal", { ascending: false }).limit(1),
        ]);
        const row = (aggRes.data && aggRes.data[0]) || {};
        const settings = settingsRes.data || { gsph_target_mode: "fixed", gsph_target_fixed: 0 };
        const whJam = (Number(row.wh_menit) || 0) / 60;
        const stroke = Number(row.stroke) || 0;
        const ng = Number(row.ng) || 0;
        const downtimeMenit = Math.round(Number(row.downtime_menit) || 0);
        const dandoriMenit = Math.round(Number(row.dandori_menit) || 0);
        const targetStdMenit = Number(row.target_std_menit) || 0;
        let targetGsph = Number(settings.gsph_target_fixed) || 0;
        if (settings.gsph_target_mode === "per_part" && targetStdMenit > 0) targetGsph = stroke / (targetStdMenit / 60);
        const gsph = whJam > 0 ? stroke / whJam : 0;
        const availability = whJam > 0 ? Math.max(0, (whJam * 60 - downtimeMenit) / (whJam * 60)) * 100 : 0;
        const performanceFactor = targetGsph > 0 ? Math.min(gsph / targetGsph, 1) * 100 : 0;
        const quality = stroke > 0 ? Math.max(0, (stroke - ng) / stroke) * 100 : 100;
        const oee = (availability / 100) * (performanceFactor / 100) * (quality / 100) * 100;
        const last = (statusRes.data && statusRes.data[0]) || null;
        return {
          mesin: m.key, label: m.label,
          data: { stroke, ng, downtimeMenit, dandoriMenit, whJam, gsph, targetGsph, availability, performanceFactor, quality, oee },
          top: (topRes.data || []).map((r) => ({ mesin: m.key, mesinLabel: m.label, kategori: r.kategori, problem: r.problem, menit: Math.round(Number(r.total_menit) || 0) })),
          byCategory: (catRes.data || []).map((r) => ({ kategori: r.kategori, menit: Math.round(Number(r.total_menit) || 0) })),
          hourly: (hourlyRes.data || []).map((r) => ({ jam: Number(r.jam), gsph: Number(r.gsph) || 0 })),
          lastPart: last ? last.part_number : null,
          lastEnd: last ? last.waktu_akhir : null,
        };
      }));

      this.machines = MACHINES.map((m) => {
        const r = results.find((x) => x.mesin === m.key);
        return { ...m, data: r.data, lastPart: r.lastPart, lastEnd: r.lastEnd };
      });

      // total gabungan
      const t = results.reduce((acc, r) => ({
        stroke: acc.stroke + r.data.stroke,
        ng: acc.ng + r.data.ng,
        downtimeMenit: acc.downtimeMenit + r.data.downtimeMenit,
        dandoriMenit: acc.dandoriMenit + r.data.dandoriMenit,
        whJam: acc.whJam + r.data.whJam,
        targetGsphSum: acc.targetGsphSum + (r.data.targetGsph > 0 ? r.data.targetGsph : 0),
        targetGsphCount: acc.targetGsphCount + (r.data.targetGsph > 0 ? 1 : 0),
      }), { stroke: 0, ng: 0, downtimeMenit: 0, dandoriMenit: 0, whJam: 0, targetGsphSum: 0, targetGsphCount: 0 });

      const gsph = t.whJam > 0 ? t.stroke / t.whJam : 0;
      const targetGsph = t.targetGsphCount > 0 ? t.targetGsphSum / t.targetGsphCount : 0;
      const availability = t.whJam > 0 ? Math.max(0, (t.whJam * 60 - t.downtimeMenit) / (t.whJam * 60)) * 100 : 0;
      const performanceFactor = targetGsph > 0 ? Math.min(gsph / targetGsph, 1) * 100 : 0;
      const quality = t.stroke > 0 ? Math.max(0, (t.stroke - t.ng) / t.stroke) * 100 : 100;
      this.totals = {
        stroke: t.stroke, ng: t.ng, downtimeMenit: t.downtimeMenit, dandoriMenit: t.dandoriMenit,
        gsph, targetGsph, availability, performanceFactor, quality,
        oee: (availability / 100) * (performanceFactor / 100) * (quality / 100) * 100,
      };

      this.lineAktif = results.filter((r) => r.data.stroke > 0).length;
      this.machinesTanpaTarget = results
        .filter((r) => r.data.stroke > 0 && (!r.data.targetGsph || r.data.targetGsph <= 0))
        .map((r) => r.label);

      // pareto downtime gabungan (per problem)
      const problemMap = {};
      results.forEach((r) => r.top.forEach((p) => {
        problemMap[p.problem] = (problemMap[p.problem] || 0) + p.menit;
      }));
      const totalDt = Object.values(problemMap).reduce((a, b) => a + b, 0);
      this.paretoDowntime = Object.entries(problemMap)
        .map(([problem, menit]) => ({ problem, menit, pct: totalDt > 0 ? (menit / totalDt) * 100 : 0 }))
        .sort((a, b) => b.menit - a.menit).slice(0, 6);

      this.fleetTop10 = results.flatMap((r) => r.top).sort((a, b) => b.menit - a.menit).slice(0, 10);

      // rasio turunan utk kartu SQCDMP
      this.ngRatePct = t.stroke > 0 ? (t.ng / t.stroke) * 100 : 0;
      this.downtimePct = t.whJam > 0 ? (t.downtimeMenit / (t.whJam * 60)) * 100 : 0;

      // Achievement (aktual vs planning), gabungan semua line
      const achRes = await Promise.all(MACHINES.map((m) =>
        supabaseClient.rpc("achievement_aggregate", { p_mesin: m.key, p_start: start.toISOString(), p_end: end.toISOString() })
      ));
      const achTotal = achRes.reduce((acc, r) => {
        const row = (r.data && r.data[0]) || {};
        return { rencana: acc.rencana + (Number(row.qty_rencana) || 0), aktual: acc.aktual + (Number(row.qty_aktual) || 0) };
      }, { rencana: 0, aktual: 0 });
      this.achievementPct = achTotal.rencana > 0 ? (achTotal.aktual / achTotal.rencana) * 100 : 0;

      await this.fetchAttendance();

      this._results = results;
      this.loading = false;
      this.$nextTick(() => this.renderAllCharts());
    },

    // Penilaian line berdasarkan OEE (standar umum: 85% world-class, 60% rata-rata)
    statusClass(m) {
      if (!m.data || m.data.stroke === 0) return "status-idle";
      const oee = m.data.oee || 0;
      if (oee >= 75) return "status-running";
      if (oee >= 50) return "status-warn";
      return "status-stop";
    },
    statusLabel(m) {
      if (!m.data || m.data.stroke === 0) return "OFF";
      const oee = m.data.oee || 0;
      if (oee >= 75) return "GOOD";
      if (oee >= 50) return "FAIR";
      return "POOR";
    },

    renderAllCharts() {
      if (!this._results) return;
      this.renderHourlyChart();
      this.renderFleetChart();
      this.renderDonut("donutAvail", this.totals.availability, cssVar("--blue"));
      this.renderDonut("donutPerf", this.totals.performanceFactor, cssVar("--green"));
      this.renderDonut("donutQual", this.totals.quality, cssVar("--amber"));
    },

    renderHourlyChart() {
      const canvas = document.getElementById("gsphHourlyChart");
      if (!canvas || typeof Chart === "undefined") return;
      if (this.charts.hourly) this.charts.hourly.destroy();

      // kumpulkan semua jam yang muncul di seluruh line
      const jamSet = new Set();
      this._results.forEach((r) => r.hourly.forEach((h) => jamSet.add(h.jam)));
      const jamList = Array.from(jamSet).sort((a, b) => a - b);

      // 1 garis per line (bukan dirata-rata jadi satu)
      const lineColors = [cssVar("--green"), cssVar("--blue"), cssVar("--amber"), cssVar("--red"), "#a855f7"];
      const datasets = this._results.map((r, idx) => {
        const map = {};
        r.hourly.forEach((h) => { map[h.jam] = h.gsph; });
        return {
          type: "line",
          label: r.label,
          data: jamList.map((j) => (map[j] !== undefined ? Number(map[j].toFixed(1)) : null)),
          borderColor: lineColors[idx % lineColors.length],
          backgroundColor: "transparent",
          tension: 0.3, pointRadius: 2, spanGaps: true, borderWidth: 2,
        };
      });

      this.charts.hourly = new Chart(canvas, {
        data: { labels: jamList.map((j) => String(j).padStart(2, "0") + ":00"), datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: { legend: { display: true, position: "top", labels: { color: cssVar("--text"), boxWidth: 10, font: { size: 10 } } } },
          scales: {
            x: { ticks: { color: cssVar("--chart-tick") }, grid: { display: false } },
            y: { ticks: { color: cssVar("--chart-tick") }, grid: { color: cssVar("--chart-grid") }, beginAtZero: true },
          },
        },
      });
    },

    renderFleetChart() {
      const canvas = document.getElementById("fleetDowntimeChart");
      if (!canvas || typeof Chart === "undefined") return;
      if (this.charts.fleet) this.charts.fleet.destroy();
      const categories = ["MESIN", "DIES", "FINGER", "OTHER"];
      const colors = { MESIN: cssVar("--blue"), DIES: cssVar("--red"), FINGER: cssVar("--green"), OTHER: cssVar("--amber") };
      this.charts.fleet = new Chart(canvas, {
        type: "bar",
        data: {
          labels: this._results.map((r) => r.label),
          datasets: categories.map((cat) => ({
            label: cat,
            data: this._results.map((r) => (r.byCategory.find((c) => c.kategori === cat) || {}).menit || 0),
            backgroundColor: colors[cat],
          })),
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: "top", labels: { color: cssVar("--text"), boxWidth: 12, font: { size: 11 } } } },
          scales: {
            x: { stacked: true, ticks: { color: cssVar("--chart-tick") }, grid: { display: false } },
            y: { stacked: true, ticks: { color: cssVar("--chart-tick") }, grid: { color: cssVar("--chart-grid") }, beginAtZero: true },
          },
        },
      });
    },

    renderDonut(canvasId, value, color) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || typeof Chart === "undefined") return;
      if (this.charts[canvasId]) this.charts[canvasId].destroy();
      const v = Math.max(0, Math.min(100, Number(value) || 0));
      this.charts[canvasId] = new Chart(canvas, {
        type: "doughnut",
        data: { datasets: [{ data: [v, 100 - v], backgroundColor: [color, cssVar("--panel-2")], borderWidth: 0 }] },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: "72%",
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
        },
        plugins: [{
          id: "centerText",
          afterDraw(chart) {
            const { ctx, chartArea } = chart;
            ctx.save();
            ctx.font = "700 15px 'Space Grotesk', sans-serif";
            ctx.fillStyle = cssVar("--text");
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(fmtNum(v) + "%", (chartArea.left + chartArea.right) / 2, (chartArea.top + chartArea.bottom) / 2);
            ctx.restore();
          },
        }],
      });
    },

    logout,
  };
}
</script>
